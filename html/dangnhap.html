
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Kimetsu no Yaiba</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../CSS/dangnhap.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/auth.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <a href="trangchu.html" class="back-link">
                <i class="fas fa-arrow-left me-2"></i> Quay lại trang chủ
            </a>

            <div class="text-center mb-4">
                <img src="../img/logo.png" alt="Logo" class="auth-logo">
            </div>

            <ul class="nav nav-pills auth-tabs" id="authTabs">
                <li class="nav-item">
                    <a class="nav-link active" id="login-tab" href="#">
                        <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="register-tab" href="#">
                        <i class="fas fa-user-plus"></i> Đăng Ký
                    </a>
                </li>
            </ul>

            <div id="login-form" class="auth-form">
                <h2 class="text-center mb-4">Chào mừng trở lại!</h2>
                <div class="form-floating mb-3">
                    <input type="email" id="login-email" class="form-control" placeholder="Email">
                    <label><i class="fas fa-envelope"></i> Email</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" id="login-password" class="form-control" placeholder="Mật khẩu">
                    <label><i class="fas fa-lock"></i> Mật khẩu</label>
                </div>
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="remember-me">
                    <label class="form-check-label" for="remember-me">Ghi nhớ đăng nhập</label>
                </div>
                <button id="loginButton" class="btn btn-primary w-100 btn-lg">
                    <span class="button-text">Đăng Nhập</span>
                    <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
                <p id="login-message" class="text-danger mt-3 text-center"></p>
            </div>

            <div id="register-form" class="auth-form d-none">
                <h2 class="text-center mb-4">Tạo tài khoản mới</h2>
                <div class="form-floating mb-3">
                    <input type="text" id="register-name" class="form-control" placeholder="Họ & Tên">
                    <label><i class="fas fa-user"></i> Họ & Tên</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" id="register-email" class="form-control" placeholder="Email">
                    <label><i class="fas fa-envelope"></i> Email</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" id="register-password" class="form-control" placeholder="Mật khẩu">
                    <label><i class="fas fa-lock"></i> Mật khẩu</label>
                </div>
                <button id="registerButton" class="btn btn-success w-100 btn-lg">
                    <span class="button-text">Đăng Ký</span>
                    <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
                <p id="register-message" class="text-danger mt-3 text-center"></p>
            </div>
        </div>
    </div>

</body>
</html>
